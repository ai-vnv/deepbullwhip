name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,network,viz,ml]"

      - name: Run tests with coverage
        env:
          PYTORCH_ENABLE_MPS_FALLBACK: "1"
        run: |
          python -m pytest tests/ --cov=deepbullwhip --cov-report=xml --cov-report=term-missing -v

      - name: Run benchmark leaderboard
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        env:
          PYTORCH_ENABLE_MPS_FALLBACK: "1"
        run: |
          python benchmarks/run_leaderboard.py --output docs/LEADERBOARD.md

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install and run ruff
        run: |
          pip install ruff
          ruff check deepbullwhip/ tests/

  vnv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,vnv,network]"

      - name: Validate spec (GtWR quality)
        run: vnvspec validate vnvspec.yaml -v

      - name: Run V&V assessment
        run: python scripts/vnv_assess.py

      - name: Upload badge artifact
        uses: actions/upload-artifact@v4
        with:
          name: vnv-badge
          path: vnv-badge.json
