name: Docs

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[docs,dev,network]"

      - name: Run V&V assessment
        run: python scripts/vnv_assess.py

      - name: Copy badge to docs site
        run: cp vnv-badge.json docs/vnv-badge.json

      - name: Build and deploy docs
        run: mkdocs gh-deploy --force
